<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Información Legal — Hospital Español del Sur Mendocino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f9fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,102,110,0.12);

    h1 { font-size: 20px; font-weight: 800; color: #00666e; margin-bottom: 6px; }
    p { font-size: 14px; color: #666; margin-bottom: 28px; }
    a {
      display: block;
      padding: 14px;
      border-radius: 10px;
      background: #00666e;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.85; }
    a.secondary {
      background: #f0fafa;
      color: #00666e;
      border: 1.5px solid #b3dde0;
    }
  </style>
